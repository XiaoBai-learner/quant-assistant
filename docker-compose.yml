# Docker Compose - 最小化部署
version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: quant_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: quant_data
      MYSQL_USER: quant_user
      MYSQL_PASSWORD: quant_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/data/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # 量化应用
  quant:
    build: .
    container_name: quant_app
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: quant_user
      DB_PASSWORD: quant_pass
      DB_NAME: quant_data
    volumes:
      - ./data:/app/data
    command: python test_mock.py

volumes:
  mysql_data:
